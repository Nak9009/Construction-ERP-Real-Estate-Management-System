name: Construction ERP CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv
        coverage: none

    - name: Copy env config
      run: php -r "file_exists('backend/.env') || copy('backend/.env.example', 'backend/.env');"

    - name: Install backend Composer dependencies
      run: cd backend && composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    - name: Generate Application Key
      run: cd backend && php artisan key:generate

    - name: Set Directory Permissions
      run: chmod -R 777 backend/storage backend/bootstrap/cache

    - name: Create database file
      run: mkdir -p backend/database && touch backend/database/database.sqlite

    - name: Run migrations & tests
      env:
        DB_CONNECTION: sqlite
        DB_DATABASE: database/database.sqlite
      run: cd backend && php artisan migrate --force && php artisan test

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'

    - name: Install frontend npm dependencies
      run: cd frontend && npm ci

    - name: Run lint
      run: cd frontend && npm run lint
